<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind the Gap - A Sidewalk Reform Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900;1,9..40,400;1,9..40,500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
	<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
	<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
	<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: #EDE6DA;
      color: #1B3A4B;
      -webkit-font-smoothing: antialiased;
    }
    #root { padding-top: 55px; }
    h1, h2, h3 { font-family: "DM Sans", sans-serif; }
    button { font-family: "DM Sans", sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(27,58,75,0.05); }
    ::-webkit-scrollbar-thumb { background: rgba(27,58,75,0.2); border-radius: 3px; }
    section { scroll-margin-top: 55px; }
  </style>
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="120" height="80" fill="#1B3A4B"/>
      <rect x="18" y="32" width="28" height="6" rx="1" fill="#B6BFB1"/>
      <rect x="50" y="32" width="20" height="6" rx="1" fill="#D89A4E"/>
      <rect x="74" y="32" width="28" height="6" rx="1" fill="#B2542C"/>
      <text x="60" y="52" font-family="sans-serif" font-size="8" fill="#EDE6DA" text-anchor="middle" font-weight="700">MIND THE GAP</text>
    </svg>
  </template>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="StoryNav.jsx"></script>
  <script type="text/babel" src="Sidecar.jsx"></script>
  <script type="text/babel" src="Sections1to5.jsx"></script>
  <script type="text/babel" src="Sections6to9.jsx"></script>
  <script type="text/babel" src="Sections10to13.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "primaryColor": "#1B3A4B",
      "accentColor": "#B2542C",
      "bgColor": "#EDE6DA",
      "fontScale": 1
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      return React.createElement(React.Fragment, null,
        React.createElement(StoryNav, { tweaks }),

        React.createElement(S1Cover,    { tweaks }),
        React.createElement(S2About,    { tweaks }),
        React.createElement(S3Network,  { tweaks }),
        React.createElement(S4Era,      { tweaks }),
        React.createElement(S5Equity,   { tweaks }),
        React.createElement(S6History,  { tweaks }),
        React.createElement(S7Swipe,    { tweaks }),
        React.createElement(S8Timeline, { tweaks }),
        React.createElement(S9Ballot,   { tweaks }),
        React.createElement(S10SIP,     { tweaks }),
        React.createElement(S11Pathways,{ tweaks }),
        React.createElement(S12Decision,{ tweaks }),
        React.createElement(S13Credits, { tweaks }),

        React.createElement(TweaksPanel, { title: "Tweaks" },
          React.createElement(TweakSection, { label: "Colors" },
            React.createElement(TweakColor, { label: "Primary (Navy)", tweakKey: "primaryColor", tweaks, setTweak }),
            React.createElement(TweakColor, { label: "Accent (Rust)", tweakKey: "accentColor", tweaks, setTweak }),
            React.createElement(TweakColor, { label: "Background (Bone)", tweakKey: "bgColor", tweaks, setTweak })
          ),
          React.createElement(TweakSection, { label: "Typography" },
            React.createElement(TweakSlider, { label: "Font scale", tweakKey: "fontScale", tweaks, setTweak, min: 0.85, max: 1.2, step: 0.05 })
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
